<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>İlim İrfan Grubu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ========== TEMEL DEĞİŞKENLER VE SIFIRLAMA ========== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #09090b; --surface: #18181b; --surface-trans: rgba(24, 24, 27, 0.85); 
      --surface2: #27272a; --border: #3f3f46; --accent: #6366f1; --accent-hover: #4f46e5;
      --accent2: #a855f7; --text: #f4f4f5; --text-dim: #a1a1aa; --radius: 18px;
      --font-brand:'Syne', sans-serif; --font-main: 'Inter', sans-serif; --font-mono: 'DM Mono', monospace;
    }

    /* Mobil klavye uyumluluğu için %100 değil, 100dvh kullanıyoruz */
    html, body { height: 100dvh; background: var(--bg); color: var(--text); font-family: var(--font-main); overflow: hidden; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; }

    /* ===== YÜKLEME VE GİRİŞ EKRANI ===== */
    #loading-screen, #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; z-index: 9999; transition: opacity .4s ease; }
    .logo-big { font-family: var(--font-brand); font-size: 2.5rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--surface2); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s infinite cubic-bezier(0.55, 0.15, 0.45, 0.85); }
    @keyframes spin { to { transform: rotate(360deg); } }

    .login-card { width: 90%; max-width: 400px; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 40px 24px; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 20px 40px rgba(0,0,0,.5); }
    .input-group { display: flex; flex-direction: column; gap: 8px; }
    .input-group label { font-size: .85rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; }
    .input-group input { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 1rem; padding: 14px; outline: none; transition: .2s; }
    .input-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: 12px; font-weight: 600; padding: 14px; cursor: pointer; transition: .2s; margin-top: 8px; }
    .btn-primary:active { transform: scale(0.98); }
    .login-error { color: #ef4444; font-size: .85rem; text-align: center; min-height: 20px; }

    /* ===== ANA YAPI VE HEADER ===== */
    #app { display: none; flex-direction: column; flex: 1; height: 100dvh; overflow: hidden; }
    .app-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: var(--surface-trans); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; z-index: 10; }
    .header-logo { font-family: var(--font-brand); font-size: 1.3rem; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 10px; }
    .header-logo img { height: 32px; width: 32px; object-fit: contain; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .user-badge { display: flex; align-items: center; gap: 8px; background: var(--surface2); border-radius: 20px; padding: 4px 12px 4px 4px; }
    .user-avatar { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: .7rem; font-weight: bold; }
    .user-nick { font-size: .85rem; font-weight: 500; }
    .btn-icon { background: none; border: none; color: var(--text-dim); font-size: 1.2rem; cursor: pointer; padding: 4px; transition: .2s; }
    .btn-icon:hover { color: #ef4444; }

    /* ===== MOBİL DOSTU ALT NAVİGASYON (BOTTOM NAV) ===== */
    .bottom-nav { display: flex; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); z-index: 20; }
    .nav-btn { flex: 1; padding: 12px 0; background: none; border: none; color: var(--text-dim); font-size: 0.8rem; font-weight: 500; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: .2s; position: relative; }
    .nav-btn .icon { font-size: 1.4rem; transition: transform .2s; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn.active .icon { transform: translateY(-2px); }
    .badge { position: absolute; top: 6px; right: calc(50% - 20px); background: #ef4444; color: #fff; font-size: 0.65rem; font-weight: bold; padding: 2px 6px; border-radius: 10px; border: 2px solid var(--surface); }

    /* ===== İÇERİK ALANLARI ===== */
    .tab-content { display: none; flex-direction: column; flex: 1; overflow: hidden; position: relative; }
    .tab-content.active { display: flex; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

    .scroll-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
    .scroll-area::-webkit-scrollbar { width: 4px; }
    .scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ===== MESAJ TASARIMI ===== */
    .msg-item { display: flex; gap: 10px; align-items: flex-end; position: relative; animation: slideUp .2s ease-out; }
    .msg-item.own { flex-direction: row-reverse; }
    @keyframes slideUp { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
    .msg-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: .7rem; font-weight: bold; color: var(--text-dim); flex-shrink: 0; }
    .msg-item.own .msg-avatar { display: none; }
    
    .msg-bubble { max-width: 78%; background: var(--surface2); border-radius: 18px 18px 18px 4px; padding: 10px 14px; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .msg-item.own .msg-bubble { background: var(--accent); color: #fff; border-radius: 18px 18px 4px 18px; }
    
    /* Sticker'lar baloncuksuz, arka plansız görünür */
    .msg-bubble.is-sticker { background: transparent !important; box-shadow: none !important; padding: 0 !important; max-width: 140px; }
    .msg-sticker-img { width: 100%; height: auto; object-fit: contain; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
    
    .msg-nick { font-size: .75rem; font-weight: 600; color: var(--accent2); margin-bottom: 4px; }
    .msg-item.own .msg-nick { display: none; }
    .msg-text { font-size: 0.95rem; line-height: 1.4; word-break: break-word; }
    .msg-time { font-size: .65rem; opacity: 0.7; margin-top: 4px; text-align: right; }

    /* Meme Ses Butonu */
    .btn-meme-play { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); color: inherit; padding: 8px 14px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.9rem; font-family: var(--font-main); transition: .2s; }
    .btn-meme-play:hover { background: rgba(255,255,255,0.25); transform: scale(1.02); }
    .btn-meme-play .play-icon { font-size: 1.2rem; }

    /* Alıntı */
    .msg-quote { background: rgba(0,0,0,0.2); border-left: 3px solid var(--accent2); padding: 6px 10px; border-radius: 6px; margin-bottom: 8px; font-size: 0.8rem; color: rgba(255,255,255,0.8); }
    .msg-item.own .msg-quote { border-left-color: #fff; }
    .btn-reply { position: absolute; top: 50%; transform: translateY(-50%); opacity: 0; background: var(--surface2); border: none; color: var(--text); border-radius: 50%; width: 28px; height: 28px; cursor: pointer; transition: .2s; }
    .msg-item:hover .btn-reply { opacity: 1; }
    .msg-item:not(.own) .btn-reply { right: -36px; }
    .msg-item.own .btn-reply { left: -36px; }

    /* ===== GİRİŞ ALANLARI (INPUT) ===== */
    .input-wrapper { background: var(--surface); border-top: 1px solid var(--border); padding: 12px 16px; flex-shrink: 0; display: flex; flex-direction: column; }
    .quote-preview { display: none; background: var(--surface2); border-left: 3px solid var(--accent); padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; align-items: center; justify-content: space-between; font-size: 0.85rem; }
    .quote-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.2rem; }
    .input-row { display: flex; align-items: flex-end; gap: 8px; }
    
    .btn-action { width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--surface2); color: var(--text); font-size: 1.2rem; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: .2s; }
    .btn-action:hover { background: var(--border); color: var(--accent); }
    .btn-action.recording { background: #ef4444; color: #fff; animation: pulse 1s infinite; }
    
    .chat-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 22px; color: var(--text); font-family: var(--font-main); padding: 12px 16px; font-size: 0.95rem; outline: none; resize: none; min-height: 44px; max-height: 100px; line-height: 1.4; }
    .chat-input:focus { border-color: var(--accent); }
    
    .btn-send { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: .2s; }
    .btn-send:active { transform: scale(0.9); }

    /* ===== STICKER & MEME ÇEKMECESİ (BOTTOM SHEET) ===== */
    .media-drawer-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; display: none; opacity: 0; transition: opacity .3s; }
    .media-drawer { position: absolute; bottom: 0; left: 0; right: 0; height: 60%; background: var(--surface); border-radius: 24px 24px 0 0; z-index: 50; display: flex; flex-direction: column; transform: translateY(100%); transition: transform .3s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.5); }
    .media-drawer.open { transform: translateY(0); }
    
    .drawer-handle { width: 40px; height: 4px; background: var(--border); border-radius: 4px; margin: 12px auto; }
    .drawer-tabs { display: flex; padding: 0 16px; border-bottom: 1px solid var(--border); }
    .drawer-tab { flex: 1; padding: 12px; text-align: center; font-weight: 600; color: var(--text-dim); border-bottom: 2px solid transparent; cursor: pointer; transition: .2s; }
    .drawer-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    
    .drawer-content { flex: 1; overflow-y: auto; padding: 16px; display: none; }
    .drawer-content.active { display: block; }
    
    /* Sticker Grid */
    .sticker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 12px; }
    .sticker-item { width: 100%; aspect-ratio: 1; border-radius: 12px; cursor: pointer; background: var(--surface2); display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 4px; transition: .2s; }
    .sticker-item img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
    .sticker-item:hover { transform: scale(1.05); background: var(--border); }
    
    /* Meme Ses Listesi */
    .meme-list { display: flex; flex-direction: column; gap: 8px; }
    .meme-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--surface2); border-radius: 12px; cursor: pointer; transition: .2s; }
    .meme-item:hover { background: var(--border); }
    .meme-item-icon { font-size: 1.5rem; }
    .meme-item-name { flex: 1; font-weight: 500; font-size: 0.95rem; }
    
    .drawer-footer { padding: 16px; border-top: 1px solid var(--border); text-align: center; }
    .btn-upload { background: var(--surface2); border: 1px dashed var(--accent); color: var(--accent); border-radius: 12px; padding: 12px 24px; font-weight: 600; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-upload:hover { background: rgba(99,102,241,0.1); }

    /* ===== DİĞER (KİŞİLER VE PANO) ===== */
    .user-list-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: var(--surface2); border-radius: 16px; cursor: pointer; margin-bottom: 8px; }
    .dm-header { display: flex; align-items: center; gap: 12px; padding: 12px 20px; background: var(--surface2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .btn-back { background: none; border: none; color: var(--text-dim); font-size: 1rem; cursor: pointer; display: flex; align-items: center; gap: 4px; }
    .post-card { background: var(--surface2); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    
    .empty-state { text-align: center; color: var(--text-dim); padding: 40px; }
    #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--text); color: var(--bg); font-weight: 600; padding: 12px 24px; border-radius: 30px; z-index: 10000; transition: .3s; }
    #toast.show { transform: translateX(-50%) translateY(0); }

    audio { height: 32px; max-width: 200px; border-radius: 16px; }
  </style>
</head>
<body>

<!-- YÜKLEME VE GİRİŞ -->
<div id="loading-screen">
  <img src="logo.png" onerror="this.style.display='none'" width="100"/>
  <div class="logo-big">İlim İrfan</div>
  <div class="spinner"></div>
</div>

<div id="login-screen">
  <div class="login-card">
    <div style="text-align:center;">
      <img src="logo.png" onerror="this.style.display='none'" width="70" style="margin-bottom:10px;"/>
      <div class="logo-big" style="font-size:1.8rem;">İlim İrfan</div>
      <p style="color:var(--text-dim); font-size:0.9rem; margin-top:4px;">Bilgi ve mizah paylaşımı</p>
    </div>
    <div class="input-group"><label>Takma Ad</label><input type="text" id="nick-input" placeholder="örn. kral" autocomplete="off"/></div>
    <div class="input-group"><label>Parola</label><input type="password" id="password-input" placeholder="Gizli kelimen" /></div>
    <button class="btn-primary" id="login-btn">Giriş Yap / Kayıt Ol</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ANA UYGULAMA -->
<div id="app">
  <header class="app-header">
    <div class="header-logo"><img src="logo.png" onerror="this.style.display='none'"/>İlim İrfan</div>
    <div class="header-right">
      <div class="user-badge"><div class="user-avatar" id="header-avatar"></div><span class="user-nick" id="header-nick"></span></div>
      <button class="btn-icon" id="logout-btn" title="Çıkış">🚪</button>
    </div>
  </header>

  <!-- 1. GENEL SOHBET -->
  <div class="tab-content active" id="tab-messages">
    <div class="scroll-area" id="messages-list"></div>
    <div class="input-wrapper">
      <div class="quote-preview" id="global-quote-preview">
        <div><strong style="color:var(--accent)" id="global-quote-nick"></strong><div id="global-quote-text" style="opacity:0.8; max-width:200px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;"></div></div>
        <button class="quote-close" onclick="cancelQuote('global')">×</button>
      </div>
      <div class="input-row">
        <button class="btn-action" onclick="openMediaDrawer('global')" title="Sticker & Meme">😜</button>
        <textarea class="chat-input" id="msg-input" placeholder="Mesaj yaz..." rows="1"></textarea>
        <button class="btn-action" id="global-mic-btn" onclick="toggleRecording('global')">🎙️</button>
        <button class="btn-send" id="msg-send-btn">➤</button>
      </div>
    </div>
  </div>

  <!-- 2. KİŞİLER (DM) -->
  <div class="tab-content" id="tab-dm">
    <div class="scroll-area" id="dm-user-list"></div>
    <div id="dm-chat-view" style="display:none; flex-direction:column; height:100%;">
      <div class="dm-header">
        <button class="btn-back" id="dm-back-btn">← Geri</button>
        <strong style="flex:1; text-align:center; padding-right:40px;" id="dm-chat-title">Nick</strong>
      </div>
      <div class="scroll-area" id="dm-messages-list"></div>
      <div class="input-wrapper">
        <div class="quote-preview" id="dm-quote-preview">
          <div><strong style="color:var(--accent)" id="dm-quote-nick"></strong><div id="dm-quote-text" style="opacity:0.8; max-width:200px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;"></div></div>
          <button class="quote-close" onclick="cancelQuote('dm')">×</button>
        </div>
        <div class="input-row">
          <button class="btn-action" onclick="openMediaDrawer('dm')">😜</button>
          <textarea class="chat-input" id="dm-input" placeholder="Özel mesaj yaz..." rows="1"></textarea>
          <button class="btn-action" id="dm-mic-btn" onclick="toggleRecording('dm')">🎙️</button>
          <button class="btn-send" id="dm-send-btn">➤</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 3. PANO -->
  <div class="tab-content" id="tab-posts">
    <div class="scroll-area" id="posts-list"></div>
    <div class="input-wrapper" style="gap:10px;">
      <textarea class="chat-input" id="post-input" placeholder="Panoya bir şeyler as..." rows="2" style="border-radius:16px;"></textarea>
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-size:0.8rem; color:var(--text-dim);"><span id="char-count">0</span>/1000</span>
        <button class="btn-primary" id="post-send-btn" style="margin:0; padding:10px 24px; border-radius:20px;">Paylaş</button>
      </div>
    </div>
  </div>

  <!-- ALT NAVİGASYON (MOBİL DOSTU) -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="messages">
      <span class="icon">💬</span><span>Sohbet</span><span class="badge" id="msg-badge" style="display:none"></span>
    </button>
    <button class="nav-btn" data-tab="dm">
      <span class="icon">👥</span><span>Kişiler</span><span class="badge" id="dm-badge" style="display:none"></span>
    </button>
    <button class="nav-btn" data-tab="posts">
      <span class="icon">📜</span><span>Pano</span><span class="badge" id="post-badge" style="display:none"></span>
    </button>
  </nav>

  <!-- STICKER & MEME ÇEKMECESİ -->
  <div class="media-drawer-overlay" id="drawer-overlay" onclick="closeMediaDrawer()"></div>
  <div class="media-drawer" id="media-drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-tabs">
      <div class="drawer-tab active" onclick="switchDrawer('stickers')" id="tab-stickers">Stickerlar</div>
      <div class="drawer-tab" onclick="switchDrawer('memes')" id="tab-memes">Meme Sesler</div>
    </div>
    
    <div class="drawer-content active" id="content-stickers">
      <div class="sticker-grid" id="sticker-grid-container"><div class="empty-state">Sticker bulunamadı.</div></div>
    </div>
    
    <div class="drawer-content" id="content-memes">
      <div class="meme-list" id="meme-list-container"><div class="empty-state">Meme sesi bulunamadı.</div></div>
    </div>

    <div class="drawer-footer">
      <button class="btn-upload" onclick="document.getElementById('media-upload').click()">
        <span>+ Yeni Ekle</span>
      </button>
      <input type="file" id="media-upload" accept="image/*,audio/*" style="display:none" onchange="handleMediaUpload(event)">
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  // ============================================================
  // 🔑 SUPABASE BİLGİLERİ
  // ============================================================
  const SUPABASE_URL      = 'https://cvuqouukrolndzzupter.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_N-iD-QAf4knsfFBmA_Opeg_wtwg-HFc';
  // ============================================================

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentNick = localStorage.getItem('ilimirfan_nick') || null;
  let activeTab = 'messages', activeDmUser = null, allUsersList = [];
  let unreadMsgs = 0, unreadPosts = 0, unreadDmMap = {};
  let quoteState = { global: null, dm: null }; 
  let activeDrawerTarget = 'global'; // Medya kime gönderilecek? global mi dm mi?
  let isRecording = false, mediaRecorder = null, audioChunks = [];
  let loadedStickers = [], loadedMemes = [];

  // Yardımcılar
  function escape(str) { return String(str||'').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  function fmtTime(iso) { const d=new Date(iso), h=d.getHours().toString().padStart(2,'0'), m=d.getMinutes().toString().padStart(2,'0'); return `${h}:${m}`; }
  function showToast(msg) { const t=document.getElementById('toast'); t.innerHTML=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
  function scrollToBottom(id) { const el=document.getElementById(id); if(el) el.scrollTop=el.scrollHeight; }
  function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }

  // Auth
  async function hashPass(p) { const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p)); return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join(''); }
  
  async function login() {
    const nick=document.getElementById('nick-input').value.trim(), pass=document.getElementById('password-input').value.trim(), err=document.getElementById('login-error');
    if(!nick || !pass) return err.textContent='Eksik bilgi girdin.';
    const btn=document.getElementById('login-btn'); btn.textContent='Bekle...'; btn.disabled=true;
    try {
      const hPass=await hashPass(pass);
      const { data } = await db.from('users').select('password').eq('nick',nick);
      if(data && data.length) { if(data[0].password!==hPass) throw new Error('Hatalı parola!'); }
      else { await db.from('users').insert([{nick,password:hPass}]); }
      currentNick=nick; localStorage.setItem('ilimirfan_nick',nick); showApp();
    } catch(e) { err.textContent=e.message; btn.textContent='Giriş Yap'; btn.disabled=false; }
  }

  function showApp() {
    document.getElementById('login-screen').style.display='none'; document.getElementById('app').style.display='flex';
    document.getElementById('header-nick').textContent=currentNick; document.getElementById('header-avatar').textContent=currentNick.substring(0,2).toUpperCase();
    loadMessages(); loadPosts(); fetchAllUsers(); loadMediaAssets(); subscribeRealtime();
    setTimeout(() => { hideLoading(); }, 200);
  }
  function hideLoading() { document.getElementById('loading-screen').style.opacity='0'; setTimeout(()=>document.getElementById('loading-screen').style.display='none', 400); }

  // Alt Menü Kontrolü
  document.querySelectorAll('.nav-btn').forEach(btn => btn.addEventListener('click', () => {
    const tab=btn.dataset.tab; activeTab=tab;
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); document.getElementById('tab-'+tab).classList.add('active');
    if(tab==='messages') { unreadMsgs=0; updateBadges(); scrollToBottom('messages-list'); }
    if(tab==='dm') { if(!activeDmUser) fetchAllUsers(); else scrollToBottom('dm-messages-list'); }
    if(tab==='posts') { unreadPosts=0; updateBadges(); }
  }));
  function updateBadges() {
    const mb=document.getElementById('msg-badge'), pb=document.getElementById('post-badge'), dmb=document.getElementById('dm-badge');
    mb.style.display=unreadMsgs>0?'block':'none'; mb.textContent=unreadMsgs; pb.style.display=unreadPosts>0?'block':'none'; pb.textContent=unreadPosts;
    const dmTot=Object.values(unreadDmMap).reduce((a,b)=>a+b,0); dmb.style.display=dmTot>0?'block':'none'; dmb.textContent=dmTot;
  }

  // Mesaj Baloncuk Oluşturucu (Sticker ve Meme Destekli)
  function appendHtmlMessage(m, listId) {
    const list = document.getElementById(listId); if (list.querySelector('.empty-state')) list.innerHTML = '';
    const sender = m.nick || m.sender_nick, isOwn = sender === currentNick;
    let contentHtml = '', isSticker = false, isAudioOrMeme = false;

    // Özel Etiket Analizi (Sticker, Ses, Normal)
    if (m.content.startsWith('[STICKER]')) {
      isSticker = true;
      contentHtml = `<img src="${escape(m.content.replace('[STICKER]', ''))}" class="msg-sticker-img" />`;
    } else if (m.content.startsWith('[MEMESOUND]')) {
      isAudioOrMeme = true;
      const parts = m.content.replace('[MEMESOUND]', '').split('||');
      contentHtml = `<button class="btn-meme-play" onclick="new Audio('${escape(parts[0])}').play()"><span class="play-icon">▶️</span> ${escape(parts[1]||'Ses')}</button>`;
    } else if (m.content.startsWith('[AUDIO]')) {
      isAudioOrMeme = true;
      contentHtml = `<audio controls src="${escape(m.content.replace('[AUDIO]', ''))}"></audio>`;
    } else {
      contentHtml = `<div class="msg-text">${escape(m.content).replace(/\n/g, '<br>')}</div>`;
    }

    let quoteHtml = '';
    if (m.quoted_nick && m.quoted_content) {
      quoteHtml = `<div class="msg-quote"><strong>${escape(m.quoted_nick)}:</strong> ${escape(m.quoted_content)}</div>`;
    }

    const div = document.createElement('div'); div.className = 'msg-item' + (isOwn ? ' own' : '');
    div.innerHTML = `
      <button class="btn-reply" onclick="setQuote('${escape(sender)}', '${isAudioOrMeme ? '🎵 Ses' : (isSticker ? '🖼️ Sticker' : escape(m.content))}', '${listId==='messages-list'?'global':'dm'}')">↩</button>
      <div class="msg-avatar">${sender.substring(0,2).toUpperCase()}</div>
      <div class="msg-bubble ${isSticker ? 'is-sticker' : ''}">
        <div class="msg-nick">${escape(sender)}</div>
        ${quoteHtml}${contentHtml}
        <div class="msg-time">${fmtTime(m.created_at)}</div>
      </div>`;
    list.appendChild(div);
    if (list.scrollHeight - list.scrollTop - list.clientHeight < 200 || isOwn) scrollToBottom(listId);
  }

  // Alıntı
  function setQuote(nick, content, context) {
    quoteState[context] = { nick, content };
    document.getElementById(`${context}-quote-preview`).style.display = 'flex';
    document.getElementById(`${context}-quote-nick`).textContent = nick;
    document.getElementById(`${context}-quote-text`).textContent = content;
    document.getElementById(`${context==='global'?'msg':'dm'}-input`).focus();
  }
  function cancelQuote(context) { quoteState[context]=null; document.getElementById(`${context}-quote-preview`).style.display='none'; }

  // Ses Kaydı
  async function toggleRecording(context) {
    const btn = document.getElementById(`${context}-mic-btn`);
    if(isRecording) { mediaRecorder.stop(); isRecording=false; btn.classList.remove('recording'); showToast('Gönderiliyor...'); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
      mediaRecorder = new MediaRecorder(stream); audioChunks=[];
      mediaRecorder.ondataavailable = e => { if(e.data.size>0) audioChunks.push(e.data); };
      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t=>t.stop());
        const {data, error} = await db.storage.from('audio').upload(`${currentNick}_${Date.now()}.webm`, new Blob(audioChunks,{type:'audio/webm'}));
        if(error) return showToast('Ses yüklenemedi');
        const url = db.storage.from('audio').getPublicUrl(data.path).data.publicUrl;
        sendActualMessage(context, `[AUDIO]${url}`);
      };
      mediaRecorder.start(); isRecording=true; btn.classList.add('recording');
    } catch(e) { showToast('Mikrofon izni yok!'); }
  }

  // Mesaj Gönderme Merkezi
  async function sendActualMessage(context, textContent) {
    const q = quoteState[context];
    if(context==='global') {
      await db.from('messages').insert({ nick: currentNick, content: textContent, quoted_nick: q?.nick, quoted_content: q?.content });
    } else {
      await db.from('private_messages').insert({ sender_nick: currentNick, receiver_nick: activeDmUser, content: textContent, quoted_nick: q?.nick, quoted_content: q?.content });
    }
    cancelQuote(context);
  }

  // Arayüz Input Tetikleyicileri
  document.getElementById('msg-send-btn').addEventListener('click', () => { const i=document.getElementById('msg-input'); if(i.value.trim()) { sendActualMessage('global', i.value.trim()); i.value=''; i.style.height='auto'; }});
  document.getElementById('dm-send-btn').addEventListener('click', () => { const i=document.getElementById('dm-input'); if(i.value.trim()) { sendActualMessage('dm', i.value.trim()); i.value=''; i.style.height='auto'; }});
  
  // Enter tuşu
  ['msg-input', 'dm-input'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById(id.replace('input','send-btn')).click(); }});
    document.getElementById(id).addEventListener('input', function() { autoResize(this); });
  });

  // ===== ÇEKMECE (STICKER & MEME) SİSTEMİ =====
  function openMediaDrawer(target) {
    activeDrawerTarget = target;
    document.getElementById('drawer-overlay').style.display='block';
    setTimeout(() => { 
      document.getElementById('drawer-overlay').style.opacity='1'; 
      document.getElementById('media-drawer').classList.add('open');
    }, 10);
  }
  function closeMediaDrawer() {
    document.getElementById('media-drawer').classList.remove('open');
    document.getElementById('drawer-overlay').style.opacity='0';
    setTimeout(() => document.getElementById('drawer-overlay').style.display='none', 300);
  }
  function switchDrawer(tab) {
    document.querySelectorAll('.drawer-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.drawer-content').forEach(c=>c.classList.remove('active'));
    document.getElementById('tab-'+tab).classList.add('active');
    document.getElementById('content-'+tab).classList.add('active');
    document.getElementById('media-upload').accept = tab==='stickers' ? 'image/*' : 'audio/*';
  }

  // Medyaları Veritabanından Çek
  async function loadMediaAssets() {
    const { data: sData } = await db.from('stickers').select('*').order('created_at', {ascending:false});
    const { data: mData } = await db.from('meme_sounds').select('*').order('created_at', {ascending:false});
    
    const sContainer = document.getElementById('sticker-grid-container'); sContainer.innerHTML='';
    if(sData && sData.length) {
      sData.forEach(s => {
        const div = document.createElement('div'); div.className='sticker-item';
        div.innerHTML = `<img src="${s.url}" />`;
        div.onclick = () => { sendActualMessage(activeDrawerTarget, `[STICKER]${s.url}`); closeMediaDrawer(); };
        sContainer.appendChild(div);
      });
    }

    const mContainer = document.getElementById('meme-list-container'); mContainer.innerHTML='';
    if(mData && mData.length) {
      mData.forEach(m => {
        const div = document.createElement('div'); div.className='meme-item';
        div.innerHTML = `<div class="meme-item-icon">🎵</div><div class="meme-item-name">${escape(m.name)}</div><div style="font-size:0.7rem; color:var(--text-dim)">Ekleyen: ${escape(m.added_by)}</div>`;
        div.onclick = () => { sendActualMessage(activeDrawerTarget, `[MEMESOUND]${m.url}||${m.name}`); closeMediaDrawer(); };
        mContainer.appendChild(div);
      });
    }
  }

  // Medya Yükleme (Kullanıcı tarafından)
  async function handleMediaUpload(e) {
    const file = e.target.files[0]; if(!file) return;
    const isImage = file.type.startsWith('image/');
    const bucket = isImage ? 'stickers' : 'meme_sounds';
    const table = isImage ? 'stickers' : 'meme_sounds';
    
    let name = "Sticker";
    if (!isImage) {
      name = prompt("Bu komik sesin adı ne olsun?");
      if(!name) return showToast("İptal edildi.");
    }

    showToast('Yükleniyor...');
    const fileName = `${Date.now()}_${file.name.replace(/\s+/g,'_')}`;
    const {data, error} = await db.storage.from(bucket).upload(fileName, file);
    
    if(error) return showToast('Yükleme hatası: ' + error.message);
    const url = db.storage.from(bucket).getPublicUrl(data.path).data.publicUrl;

    await db.from(table).insert({ url: url, name: name, added_by: currentNick });
    showToast('Başarıyla eklendi!');
    loadMediaAssets(); // Listeyi yenile
    e.target.value = ''; // Inputu sıfırla
  }

  // ===== TEMEL SOHBET / PANO GETİRME =====
  async function loadMessages() {
    const { data } = await db.from('messages').select('*').order('created_at',{ascending:true}).limit(100);
    const list = document.getElementById('messages-list'); list.innerHTML='';
    if(data) data.forEach(m => appendHtmlMessage(m, 'messages-list')); setTimeout(()=>scrollToBottom('messages-list'),100);
  }
  async function fetchAllUsers() {
    const { data } = await db.from('users').select('nick').order('created_at', {ascending:false});
    if(data) { allUsersList = data.filter(u=>u.nick!==currentNick); renderUserList(); }
  }
  function renderUserList() {
    const list=document.getElementById('dm-user-list'); list.innerHTML='';
    allUsersList.forEach(u => {
      const b=unreadDmMap[u.nick]||0;
      const div=document.createElement('div'); div.className='user-list-item';
      div.innerHTML=`<div class="user-avatar" style="width:36px;height:36px">${u.nick.substring(0,2).toUpperCase()}</div><strong style="flex:1">${escape(u.nick)}</strong>${b>0?`<span style="background:#ef4444;color:#fff;padding:2px 8px;border-radius:10px;font-size:0.7rem">${b}</span>`:''}`;
      div.onclick=()=>openDm(u.nick); list.appendChild(div);
    });
  }
  async function openDm(nick) {
    activeDmUser=nick; document.getElementById('dm-user-list').style.display='none'; document.getElementById('dm-chat-view').style.display='flex';
    document.getElementById('dm-chat-title').textContent=nick; if(unreadDmMap[nick]) { delete unreadDmMap[nick]; updateBadges(); }
    const list=document.getElementById('dm-messages-list'); list.innerHTML='';
    const { data } = await db.from('private_messages').select('*').or(`and(sender_nick.eq.${currentNick},receiver_nick.eq.${nick}),and(sender_nick.eq.${nick},receiver_nick.eq.${currentNick})`).order('created_at',{ascending:true}).limit(100);
    if(data) data.forEach(m => appendHtmlMessage(m, 'dm-messages-list')); setTimeout(()=>scrollToBottom('dm-messages-list'),100);
  }
  document.getElementById('dm-back-btn').onclick = () => { activeDmUser=null; document.getElementById('dm-chat-view').style.display='none'; document.getElementById('dm-user-list').style.display='block'; renderUserList(); };

  async function loadPosts() {
    const { data } = await db.from('posts').select('*').order('created_at',{ascending:false}).limit(50);
    const list=document.getElementById('posts-list'); list.innerHTML='';
    if(data) data.forEach(p => { const d=document.createElement('div'); d.className='post-card'; d.innerHTML=`<div class="post-header"><div class="user-avatar">${p.nick.substring(0,2).toUpperCase()}</div><div><strong>${escape(p.nick)}</strong><div style="font-size:0.7rem;opacity:0.7">${fmtTime(p.created_at)}</div></div></div><div>${escape(p.content)}</div>`; list.appendChild(d); });
  }
  document.getElementById('post-send-btn').onclick = async () => { const i=document.getElementById('post-input'); if(i.value.trim()){ await db.from('posts').insert({nick:currentNick, content:i.value.trim()}); i.value=''; showToast('Pano güncellendi'); } };
  document.getElementById('post-input').oninput = function() { document.getElementById('char-count').textContent=this.value.length; };

  // ===== REALTIME YAYINLARI =====
  function subscribeRealtime() {
    db.channel('public-messages').on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'}, p=>{
      appendHtmlMessage(p.new, 'messages-list');
      if(activeTab!=='messages' && p.new.nick!==currentNick){ unreadMsgs++; updateBadges(); }
    }).subscribe();

    db.channel('public-private').on('postgres_changes',{event:'INSERT',schema:'public',table:'private_messages'}, p=>{
      const pm=p.new;
      if(pm.sender_nick===currentNick || pm.receiver_nick===currentNick) {
        if(activeDmUser===(pm.sender_nick===currentNick?pm.receiver_nick:pm.sender_nick)) {
          appendHtmlMessage(pm, 'dm-messages-list');
          if(pm.receiver_nick===currentNick && activeTab!=='dm') { unreadDmMap[pm.sender_nick]=(unreadDmMap[pm.sender_nick]||0)+1; updateBadges(); }
        } else if(pm.receiver_nick===currentNick) {
          unreadDmMap[pm.sender_nick]=(unreadDmMap[pm.sender_nick]||0)+1; updateBadges();
          if(activeTab==='dm') renderUserList();
        }
      }
    }).subscribe();
    
    db.channel('public-posts').on('postgres_changes',{event:'INSERT',schema:'public',table:'posts'}, ()=>{ loadPosts(); if(activeTab!=='posts'){ unreadPosts++; updateBadges(); } }).subscribe();
  }

  // Başlangıç
  document.getElementById('login-btn').onclick = login;
  document.getElementById('password-input').onkeydown = e => { if(e.key==='Enter') login(); };
  document.getElementById('logout-btn').onclick = () => { localStorage.clear(); location.reload(); };

  (async function init() {
    if(currentNick) showApp(); else { document.getElementById('login-screen').style.display='flex'; hideLoading(); }
  })();
</script>
</body>
</html>
